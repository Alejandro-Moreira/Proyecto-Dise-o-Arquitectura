name: 🔬 CI — Build, Lint & Test

# ──────────────────────────────────────────────────────────────────
# Se ejecuta en:
#   - Cada push a cualquier rama
#   - Cada Pull Request hacia `main` o `develop`
# ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:

  # ── Job 1: Lint de código (ESLint) ────────────────────────────────
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, users-service, documents-service, signature-worker]
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Instalar dependencias (${{ matrix.service }})
        working-directory: ${{ matrix.service }}
        run: npm ci --prefer-offline

      - name: Ejecutar ESLint (${{ matrix.service }})
        working-directory: ${{ matrix.service }}
        run: npm run lint

  # ── Job 2: Tests unitarios e integración ─────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: lint

    # Servicios de infraestructura necesarios para los tests de integración
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecofirma_user
          POSTGRES_PASSWORD: ecofirma_test_password
          POSTGRES_DB: ecofirma_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: ecofirma_rabbit
          RABBITMQ_DEFAULT_PASS: ecofirma_rabbit_test_password
        options: >-
          --health-cmd "rabbitmq-diagnostics check_port_connectivity"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
        ports:
          - 5672:5672

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: ecofirma_test_db
      POSTGRES_USER: ecofirma_user
      POSTGRES_PASSWORD: ecofirma_test_password
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_TTL: 60
      RABBITMQ_USER: ecofirma_rabbit
      RABBITMQ_PASSWORD: ecofirma_rabbit_test_password
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: 5672
      JWT_SECRET: ci_test_jwt_secret_min_32_chars_ok
      JWT_EXPIRES_IN: 1h
      INTERNAL_TOKEN: ci_internal_test_token
      DOCUMENTS_SERVICE_URL: http://localhost:3002

    strategy:
      matrix:
        service: [users-service, documents-service]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Instalar dependencias (${{ matrix.service }})
        working-directory: ${{ matrix.service }}
        run: npm ci --prefer-offline

      - name: Ejecutar tests (${{ matrix.service }})
        working-directory: ${{ matrix.service }}
        run: npm test -- --coverage --forceExit

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage/
          retention-days: 14

  # ── Job 3: Build Docker images ────────────────────────────────────
  build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        service:
          - name: gateway
            context: ./gateway
          - name: users-service
            context: ./users-service
          - name: documents-service
            context: ./documents-service
          - name: signature-worker
            context: ./signature-worker

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: false   # Solo build en CI (push ocurre en CD)
          tags: ecofirma/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Docker Compose smoke test ─────────────────────────────
  smoke-test:
    name: 💨 Smoke Test (docker-compose)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Crear .env para smoke test
        run: |
          cp .env.example .env
          echo "JWT_SECRET=smoke_test_secret_key_min_32_characters_ok" >> .env

      - name: Levantar stack completo
        run: docker compose up -d --build --wait
        timeout-minutes: 5

      - name: Verificar health de todos los servicios
        run: |
          echo "🔍 Verificando Gateway..."
          curl -f http://localhost:8080/health
          echo ""
          echo "✅ Todos los servicios están saludables."

      - name: Smoke test E2E: Registro → Login → Documento → Estado FIRMADO
        run: |
          # 1. Registrar usuario
          REGISTER=$(curl -sf -X POST http://localhost:8080/api/users/register \
            -H "Content-Type: application/json" \
            -d '{"nombre":"CI Bot","email":"cibot@ecofirma.test","password":"ci_test_pass_123"}')
          echo "Registro: $REGISTER"
          USER_ID=$(echo $REGISTER | python3 -c "import sys,json; print(json.load(sys.stdin)['userId'])")

          # 2. Login
          LOGIN=$(curl -sf -X POST http://localhost:8080/api/users/login \
            -H "Content-Type: application/json" \
            -d '{"email":"cibot@ecofirma.test","password":"ci_test_pass_123"}')
          TOKEN=$(echo $LOGIN | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          echo "JWT obtenido: ${TOKEN:0:30}..."

          # 3. Crear documento
          DOC=$(curl -sf -X POST http://localhost:8080/api/documents \
            -H "Content-Type: application/json" \
            -d "{\"titulo\":\"Contrato CI\",\"contenidoBase64\":\"Q0kgVGVzdA==\",\"autorId\":\"$USER_ID\"}")
          echo "Documento creado: $DOC"
          DOC_ID=$(echo $DOC | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          ESTADO=$(echo $DOC | python3 -c "import sys,json; print(json.load(sys.stdin)['estado'])")
          echo "Estado inicial: $ESTADO"

          # 4. Esperar firma asíncrona (~5s)
          echo "⏳ Esperando firma asíncrona..."
          sleep 6

          # 5. Verificar estado FIRMADO
          FINAL=$(curl -sf http://localhost:8080/api/documents/$DOC_ID)
          ESTADO_FINAL=$(echo $FINAL | python3 -c "import sys,json; print(json.load(sys.stdin)['estado'])")
          echo "Estado final: $ESTADO_FINAL"

          if [ "$ESTADO_FINAL" != "FIRMADO" ]; then
            echo "❌ ERROR: El documento debería estar FIRMADO pero está: $ESTADO_FINAL"
            exit 1
          fi
          echo "✅ Smoke test E2E completado exitosamente."

      - name: Capturar logs en caso de fallo
        if: failure()
        run: docker compose logs --no-color

      - name: Bajar stack
        if: always()
        run: docker compose down -v
