global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: prometheus
          environment: local

  - job_name: ecofirma-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:8080']
        labels:
          service: gateway
          environment: local

  - job_name: ecofirma-users-service
    metrics_path: /metrics
    static_configs:
      - targets: ['users-service:3001']
        labels:
          service: users-service
          environment: local

  - job_name: ecofirma-documents-service
    metrics_path: /metrics
    static_configs:
      - targets: ['documents-service:3002']
        labels:
          service: documents-service
          environment: local

  - job_name: ecofirma-signature-worker
    metrics_path: /metrics
    static_configs:
      - targets: ['signature-worker:3003']
        labels:
          service: signature-worker
          environment: local

  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: postgres
          environment: local

  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: redis
          environment: local

  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']
        labels:
          service: rabbitmq
          environment: local
