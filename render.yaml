services:
  - type: web
    runtime: static
    name: ecofirma-frontend
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://ecofirma-gateway.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: docker
    name: ecofirma-gateway
    plan: free
    dockerContext: ./gateway
    dockerfilePath: ./gateway/Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 8080
      - key: USERS_SERVICE_URL
        value: https://ecofirma-users-service.onrender.com
      - key: DOCUMENTS_SERVICE_URL
        value: https://ecofirma-documents-service.onrender.com
      - key: CORS_ORIGIN
        value: https://ecofirma-frontend.onrender.com, https://alejandro-moreira.github.io
      - key: JWT_SECRET
        fromService:
          type: web
          name: ecofirma-users-service
          envVarKey: JWT_SECRET

  - type: web
    runtime: docker
    name: ecofirma-users-service
    plan: free
    dockerContext: ./users-service
    dockerfilePath: ./users-service/Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: ecofirma-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 2h
      - key: NODE_ENV
        value: production


  - type: web
    runtime: docker
    name: ecofirma-documents-service
    plan: free
    dockerContext: ./documents-service
    dockerfilePath: ./documents-service/Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 3002
      - key: DATABASE_URL
        fromDatabase:
          name: ecofirma-postgres
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: ecofirma-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: ecofirma-redis
          property: port
      - key: REDIS_TTL
        value: 300
      - key: INTERNAL_TOKEN
        generateValue: true

  - type: keyvalue
    name: ecofirma-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    persistenceMode: off
    ipAllowList: []

databases:
  - name: ecofirma-postgres
    databaseName: ecofirma_db
    user: ecofirma_user
    plan: free
    ipAllowList: []
